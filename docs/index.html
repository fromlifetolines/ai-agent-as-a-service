<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent as a Service - From Life To Lines</title>
    <meta name="description" content="為中小企業打造的無代碼 AI 預約客服系統。24/7 自動化客服，30 分鐘快速上線。">
    <meta name="keywords" content="AI客服, 預約系統, 無代碼, SaaS, 客服自動化">
    <meta name="author" content="From Life To Lines">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 60px 40px;
            max-width: 600px;
            text-align: center;
            animation: slideUp 0.6s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #FF6B35;
            font-size: 32px;
            margin-bottom: 12px;
            font-weight: 700;
        }
        
        .subtitle {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 40px 0;
            text-align: left;
        }
        
        .feature {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #FF6B35;
        }
        
        .feature-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        
        .feature-desc {
            font-size: 13px;
            color: #666;
        }
        
        .buttons {
            display: flex;
            gap: 12px;
            margin-top: 40px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            display: inline-block;
        }
        
        .btn-primary {
            background: #FF6B35;
            color: white;
        }
        
        .btn-primary:hover {
            background: #E55A2B;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 107, 53, 0.3);
        }
        
        .btn-secondary {
            background: white;
            color: #FF6B35;
            border: 2px solid #FF6B35;
        }
        
        .btn-secondary:hover {
            background: #FFF5F0;
            transform: translateY(-2px);
        }
        
        .info {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #eee;
            font-size: 13px;
            color: #999;
        }
        
        .links {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .links a {
            color: #FF6B35;
            text-decoration: none;
            font-size: 12px;
            transition: color 0.3s ease;
        }
        
        .links a:hover {
            color: #E55A2B;
            text-decoration: underline;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 40px 20px;
            }
            
            h1 {
                font-size: 24px;
            }
            
            .features {
                grid-template-columns: 1fr;
            }
            
            .buttons {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🤖</div>
        
        <h1>AI Agent as a Service</h1>
        <p class="subtitle">為中小企業打造的無代碼 AI 預約客服系統</p>
        
        <div class="features">
            <div class="feature">
                <div class="feature-title">⚡ 30 分鐘上線</div>
                <div class="feature-desc">無需技術背景，開箱即用</div>
            </div>
            <div class="feature">
                <div class="feature-title">💬 LINE 優先</div>
                <div class="feature-desc">台灣最高滲透率支援</div>
            </div>
            <div class="feature">
                <div class="feature-title">📅 自動預約</div>
                <div class="feature-desc">智能確認與提醒</div>
            </div>
            <div class="feature">
                <div class="feature-title">📊 實時分析</div>
                <div class="feature-desc">完整數據追蹤</div>
            </div>
        </div>
        
        <div class="buttons">
            <a href="https://github.com/fromlifetolines/ai-agent-as-a-service" class="btn btn-primary">
                📖 查看代碼
            </a>
            <a href="https://github.com/fromlifetolines/ai-agent-as-a-service#快速開始" class="btn btn-secondary">
                🚀 快速開始
            </a>
        </div>
        
        <div class="info">
            <p><strong>From Life To Lines</strong> - 生活線條設計工作室</p>
            <p style="margin-top: 10px;">專業的 AI 客服解決方案，幫助中小企業降低 70-80% 客服成本</p>
            
            <div class="links">
                <a href="https://www.behance.net/howard-huang" target="_blank">Behance</a>
                <a href="https://www.instagram.com/fromlifetolines/" target="_blank">Instagram</a>
                <a href="https://www.linkedin.com/in/howard-huang-designer/" target="_blank">LinkedIn</a>
                <a href="https://github.com/fromlifetolines" target="_blank">GitHub</a>
                <a href="https://line.me/R/ti/p/@242lqfuy" target="_blank">LINE</a>
            </div>
        </div>
    </div>
</body>
</html>
